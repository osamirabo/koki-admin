<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Koki Admin Dashboard</title>

<style>
body{
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

h1{
  text-align:center;
  color:#e65100;
}

.order{
  background:white;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.total{
  color:green;
  font-weight:bold;
}

.time{
  color:gray;
  font-size:14px;
}

.item{
  margin-left:15px;
}
</style>
</head>

<body>

<h1>👨‍💼 Koki Admin Dashboard</h1>

<button onclick="clearOrders()" style="
background:red;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
">
🗑️ Clear All Orders
</button>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCtfN07wHJaja2Sofz59qCdZ7nWFbiOWqE",
  authDomain: "koki-mzboot-zbta.firebaseapp.com",
  databaseURL: "https://koki-mzboot-zbta-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "koki-mzboot-zbta",
  storageBucket: "koki-mzboot-zbta.firebasestorage.app",
  messagingSenderId: "912505103789",
  appId: "1:912505103789:web:bc220a363b7603c1c96d24"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersRef = ref(db, "orders");

/* CLEAR ALL ORDERS */
window.clearOrders = function(){

  let confirmClear = confirm("Delete all orders?");

  if(confirmClear){
    remove(ordersRef);
  }
}

/* DELETE SINGLE ORDER */
window.deleteOrder = function(orderId){

  let confirmDelete = confirm("Delete this order?");

  if(confirmDelete){
    remove(ref(db, "orders/" + orderId));
  }
}

onValue(ordersRef, (snapshot) => {

  const data = snapshot.val();

  const ordersDiv = document.getElementById("orders");

  ordersDiv.innerHTML = "";

  if(!data){
    ordersDiv.innerHTML = "<h3>No Orders Yet</h3>";
    return;
  }

  Object.entries(data).reverse().forEach(([orderId, order]) => {

    let itemsHtml = "";

    order.items.forEach(item => {
      itemsHtml += `
        <div class="item">
          🍔 ${item.item} - ${item.price} EGP
        </div>
      `;
    });

    ordersDiv.innerHTML += `
      <div class="order">

        <h2>
          🛒 New Order

          <button onclick="deleteOrder('${orderId}')" style="
          background:red;
          color:white;
          border:none;
          padding:6px 10px;
          border-radius:6px;
          float:right;
          cursor:pointer;
          ">
          ❌ Delete
          </button>

        </h2>

        ${itemsHtml}

        <p class="total">
          Total: ${order.total} EGP
        </p>

        <p>
          Items Count: ${order.itemCount}
        </p>

        <p class="time">
          🕒 ${order.time}
        </p>

      </div>
    `;
  });

});

</script>

</body>
</html>
